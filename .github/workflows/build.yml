name: build and test

on:
  pull_request:
  push:
  release:
    types:
      - released
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  cmake:
    strategy:
      matrix:
        runs-on:
          - ubuntu-22.04
          - ubuntu-latest
          - ubuntu-22.04-arm
          - ubuntu-24.04-arm
          # Standard (free) macOS runners.
          # https://docs.github.com/en/actions/reference/runners/github-hosted-runners#standard-github-hosted-runners-for-public-repositories
          - macos-14           # AArch64
          - macos-15           # AArch64
          - macos-26           # AArch64
          - macos-15-intel     # x86-64
          - macos-26-intel     # x86-64
      fail-fast: false
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set NUM_CORES
        run: |
          NUM_CORES=$(getconf _NPROCESSORS_ONLN)
          echo "NUM_CORES=$NUM_CORES" >> $GITHUB_ENV
          echo "Detected $NUM_CORES cores"
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ${{ github.job }}-${{ matrix.runs-on }}
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install swig
      - run: mkdir build
      - run: >
          cmake
          -DWITH_PYTHON=ON
          -DWITH_PYTHON_LIMITED_API=${{ !startsWith(matrix.runs-on, 'ubuntu-22') && 'ON' || 'OFF' }}
          -DFETCH_ABSEIL=ON
          -DCMAKE_BUILD_TYPE=Dev
          -DCMAKE_CXX_STANDARD=17
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          ..
        working-directory: build/
      - run: cmake --build . --parallel ${{ env.NUM_CORES }}
        working-directory: build/
      - if: always()
        run: ctest --parallel ${{ env.NUM_CORES }} --output-on-failure
        working-directory: build/
  cmake-big-endian:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    env:
      ARM_TOOLCHAIN_VERSION: "13.3.rel1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set NUM_CORES
        run: |
          NUM_CORES=$(getconf _NPROCESSORS_ONLN)
          echo "NUM_CORES=$NUM_CORES" >> $GITHUB_ENV
          echo "Detected $NUM_CORES cores"
      - name: Install QEMU user-mode
        run: sudo apt-get update && sudo apt-get install -y qemu-user
      - name: Download Arm GNU Toolchain
        run: |
          TARBALL="arm-gnu-toolchain-${ARM_TOOLCHAIN_VERSION}-aarch64-aarch64_be-none-linux-gnu.tar.xz"
          URL="https://developer.arm.com/-/media/Files/downloads/gnu/${ARM_TOOLCHAIN_VERSION}/binrel/${TARBALL}"
          wget -q "$URL"
          echo "46e8e8a573766f761efe7a16240bc2355b67cb30fab7ecc508b03f36c3034290  $TARBALL" | sha256sum --check
          tar xf "$TARBALL" -C /opt
          TOOLCHAIN_DIR="/opt/arm-gnu-toolchain-${ARM_TOOLCHAIN_VERSION}-aarch64-aarch64_be-none-linux-gnu"
          echo "${TOOLCHAIN_DIR}/bin" >> $GITHUB_PATH
          echo "TOOLCHAIN_DIR=${TOOLCHAIN_DIR}" >> $GITHUB_ENV
      - name: Create CMake toolchain file
        run: |
          cat > toolchain-aarch64_be.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER   aarch64_be-none-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64_be-none-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF
      - run: mkdir build
      - run: >
          cmake
          -DCMAKE_TOOLCHAIN_FILE=../toolchain-aarch64_be.cmake
          -DCMAKE_CROSSCOMPILING_EMULATOR="qemu-aarch64_be;-L;${{ env.TOOLCHAIN_DIR }}/aarch64_be-none-linux-gnu/libc"
          -DWITH_PYTHON=OFF
          -DFETCH_ABSEIL=ON
          -DSKIP_OPENSSL_TESTS=ON
          -DCMAKE_BUILD_TYPE=Dev
          -DCMAKE_CXX_STANDARD=17
          ..
        working-directory: build/
      - run: cmake --build . --parallel ${{ env.NUM_CORES }}
        working-directory: build/
      - if: always()
        name: Run tests
        run: |
          # Known failures due to unimplemented big-endian encoding/decoding.
          EXCLUDE="EncodedS2PointVectorTest\.(Empty|OnePoint|AllExceptionsBlock|RoundtripEncodingFast)"
          EXCLUDE+="|EncodedS2ShapeIndex\.(OneEdge|RegularLoops|OverlappingPointClouds|OverlappingPolylines|OverlappingLoops|JavaByteCompatibility)"
          EXCLUDE+="|S2LaxPolygonShape\.(EmptyPolygon|FullPolygon|ManyLoopPolygon|InvertedLoops|S2CoderWorks)"
          EXCLUDE+="|S2LaxPolygonShapeTest\.BadLoopOffsets"
          EXCLUDE+="|S2LaxPolylineShape\.S2CoderWorks"
          EXCLUDE+="|S2Point\.CoderWorks"
          EXCLUDE+="|S2RegionEncodeDecodeTest\.S2(Loop|Polygon|Polyline)"
          EXCLUDE+="|FastEncodeTaggedShapes\.MixedShapes"
          EXCLUDE+="|DecodeTaggedShapes\.(DecodeFromByteString|DecodeFromEncoded)"
          EXCLUDE+="|OutgoingEdgeButNoIncomingEdge"
          ctest --parallel ${{ env.NUM_CORES }} --output-on-failure -E "$EXCLUDE"
        working-directory: build/
  bazel:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # We would like to test on the oldest and newest supported.
    # https://github.com/google/oss-policies-info/blob/main/foundational-cxx-support-matrix.md
    # https://bazel.build/release#support-matrix
    # It's not clear how to do that since bazelisk has some magic to pick a
    # bazel version.

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86  # v0.19.0
      with:
        # Avoid downloading Bazel every time.
        bazelisk-cache: true
        # Share caches between workflows.
        disk-cache: true
        repository-cache: true
        # The Bazel workspace is in the src directory.
        module-root: src

    - name: Build and Test
      run: |
        bazel test \
          --config=ci \
          --config=dev \
          --keep_going \
          --test_verbose_timeout_warnings \
          //...
      working-directory: src
  python:
    timeout-minutes: 10
    strategy:
      matrix:
        runs-on:
          - ubuntu-latest
          - ubuntu-24.04-arm
          # Standard (free) macOS runners.
          # TODO: Expand to the full set of 5 macOS runners if this won't
          # cause trouble for the PyPI upload.
          - macos-15           # AArch64
          - macos-15-intel     # x86-64
      fail-fast: false
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
          persist-credentials: false
      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        with:
          package-dir: ./
          output-dir: dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.runs-on }}
          path: ./dist/
  python-publish:
    if: (github.event_name == 'release') && (github.event.action == 'released')
    needs: [python]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    # Requires environment protection rules in GitHub Settings:
    # Settings > Environments > pypi > Add required reviewers
    environment:
      name: pypi
      url: https://pypi.org/p/s2geometry
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dist*
          path: dist/
          merge-multiple: true
      - uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: "dist/*"
      # To upload to PyPI without a token, add this workflow file as a Trusted Publisher in the project settings on the PyPI website
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
