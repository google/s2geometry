name: build and test

on:
  pull_request:
  push:
  release:
    types:
      - released
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  cmake:
    strategy:
      matrix:
        runs-on:
          - ubuntu-22.04
          - ubuntu-latest
          # `large` is x86-64 and `xlarge` is AArch64.
          # https://docs.github.com/en/actions/reference/runners/larger-runners#available-macos-larger-runners-and-labels
          - macos-14-large
          - macos-14-xlarge
          - macos-latest-large
          # macos-latest-xlarge may timeout.
          # https://github.com/google/s2geometry/issues/409
          - macos-latest-xlarge
      fail-fast: false
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    steps:
      - uses: zacharyburnett/setup-abseil-cpp@5386866b5b554e420966aa7f31a477ad92f185d2 # Not a release, but has #423 fix.
        with:
          cmake-build-args: "-DCMAKE_CXX_STANDARD=17 -DABSL_PROPAGATE_CXX_STD=ON -DABSL_ENABLE_INSTALL=ON -DBUILD_TESTING=off -DCMAKE_POSITION_INDEPENDENT_CODE=ON"
          abseil-version: "20250814.1"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: mkdir build
      - run: >
          cmake
          -DWITH_PYTHON=OFF
          -DCMAKE_CXX_STANDARD=17
          -DCMAKE_PREFIX_PATH=/usr/local/
          ..
        working-directory: build/
      - run: cmake --build . --parallel 45
        working-directory: build/
      - if: always()
        run: cmake --build . --parallel 45 --target=test
        env:
          CTEST_OUTPUT_ON_FAILURE: ON
          CTEST_PARALLEL_LEVEL: 45
        working-directory: build/
  bazel:
    runs-on: ubuntu-latest

    # We would like to test on the oldest and newest supported.
    # https://github.com/google/oss-policies-info/blob/main/foundational-cxx-support-matrix.md
    # https://bazel.build/release#support-matrix
    # It's not clear how to do that since bazelisk has some magic to pick a
    # bazel version.

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Setup Bazel ${{ matrix.bazel }}
      uses: bazel-contrib/setup-bazel@083175551ceeceebc757ebee2127fde78840ca77  # v0.18.0
      with:
        # Avoid downloading Bazel every time.
        bazelisk-cache: true
        # Store build cache per workflow.
        disk-cache: ${{ github.workflow }}
        # Share repository cache between workflows.
        repository-cache: true

    - name: Build and Test
      run: |
        bazel test \
          --jobs=45 --keep_going \
          --test_verbose_timeout_warnings --test_output=errors \
          //...
      working-directory: src
  python:
    strategy:
      matrix:
        runs-on:
          - ubuntu-latest
          - macos-14-large
          - macos-14-xlarge
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: zacharyburnett/setup-abseil-cpp@5386866b5b554e420966aa7f31a477ad92f185d2 # Not a release, but has #423 fix.
        with:
          cmake-build-args: "-DCMAKE_CXX_STANDARD=17 -DABSL_PROPAGATE_CXX_STD=ON -DABSL_ENABLE_INSTALL=ON -DBUILD_TESTING=off -DCMAKE_POSITION_INDEPENDENT_CODE=ON"
          abseil-version: "20250814.1"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
          persist-credentials: false
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          # Cache disabled to prevent cache-poisoning attacks on release artifacts.
          enable-cache: false
      - run: uv build --sdist --wheel
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-${{ runner.os }}-${{ runner.arch }}
          path: ./dist/
  python-publish:
    if: (github.event_name == 'release') && (github.event.action == 'released')
    needs: [python]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    # Requires environment protection rules in GitHub Settings:
    # Settings > Environments > pypi > Add required reviewers
    environment:
      name: pypi
      url: https://pypi.org/p/s2geometry
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: dist*
          path: dist/
          merge-multiple: true
      - uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: "dist/*"
      # To upload to PyPI without a token, add this workflow file as a Trusted Publisher in the project settings on the PyPI website
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
